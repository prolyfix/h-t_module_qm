name: Module CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Lint PHP sources
        run: find src tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run bundle metadata test
        run: php tests/BundleMetadataTest.php

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create package archive
        run: |
          zip -r module-${GITHUB_REF_NAME}.zip . -x '.git/*' 'vendor/*' '.github/*'

      - name: Publish GitHub release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: module-${{ github.ref_name }}.zip
